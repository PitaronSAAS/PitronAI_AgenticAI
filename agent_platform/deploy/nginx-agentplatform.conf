# Add these location blocks inside your existing pitronai.pro server block
# File: /etc/nginx/sites-available/pitronai.pro

# ── Agent API (FastAPI on port 8000) ─────────────────────────────────────────
location /v1/ {
    proxy_pass         http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 64k;
}

# ── Widget JS (static files) ──────────────────────────────────────────────────
location /widget/ {
    alias /opt/agentplatform/widget/;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    add_header Access-Control-Allow-Origin *;
    gzip on;
    gzip_types application/javascript;
}

# ── Admin dashboard (Streamlit on port 8502) ──────────────────────────────────
location /agent-admin/ {
    proxy_pass         http://127.0.0.1:8502/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 86400;
}
